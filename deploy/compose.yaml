# Reference Compose for LlmUtilityApi — llm-utility-api, a stateless MCP tool server for LLM agents.
# Every value below is an overridable ${VAR:-default} sample (see deploy/.env.example); values
# marked :?required must be set.
#
# The service exposes ONLY an agent MCP surface at /mcp (LAN/WireGuard-only) plus health + OpenAPI.
# The Cloudflare Tunnel MUST NOT route /mcp — the app 404s any /mcp request carrying Cloudflare edge
# headers as a backstop (UseMcpLanOnly). The fetch tool reaches the public internet but refuses
# private/loopback/link-local addresses (SSRF guard); keep AllowPrivateNetworks=false. The web_search
# tool talks only to the internal searxng sidecar (a trusted endpoint, so not SSRF-guarded).
services:
  llm-utility-api:
    image: danbro96/llm-utility-api:${IMAGE_TAG:-latest}
    container_name: llm-utility-api
    environment:
      Auth__ApiKeys__0__Key: ${UTILITY_API_KEY:?required}
      Auth__ApiKeys__0__Name: ${UTILITY_API_KEY_NAME:-prod}
      # Per-caller keys: own rate-limit bucket + name in logs. family-web = the portal chat's tool loop.
      # Add more consumers as Auth__ApiKeys__N__Key / __N__Name.
      Auth__ApiKeys__1__Key: ${FAMILY_WEB_API_KEY:?required}
      Auth__ApiKeys__1__Name: family-web
      Auth__AllowedOrigins__0: ${ALLOWED_ORIGIN:-}
      RateLimit__RequestsPerMinute: ${RATE_LIMIT:-120}
      Fetch__MaxResponseBytes: ${FETCH_MAX_BYTES:-5242880}
      Fetch__TimeoutSeconds: ${FETCH_TIMEOUT:-20}
      Fetch__MaxRedirects: ${FETCH_MAX_REDIRECTS:-5}
      Fetch__AllowPrivateNetworks: ${FETCH_ALLOW_PRIVATE:-false}
      Doc__MaxBytes: ${DOC_MAX_BYTES:-20971520}
      # web_search → the searxng sidecar (internal). Trusted endpoint, not SSRF-guarded.
      Search__BaseUrl: ${SEARXNG_URL:-http://searxng:8080}
      Search__MaxResults: ${SEARCH_MAX_RESULTS:-10}
      Search__TimeoutSeconds: ${SEARCH_TIMEOUT:-15}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod}
    ports:
      - "${HOST_PORT:-41480}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - default
      - medelynas_telemetry

  # web_search backend. Internal only — no host port; only llm-utility-api reaches it on `default`.
  # settings.yml enables the JSON API (off by default) and disables the limiter (no Valkey needed).
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?required}   # openssl rand -hex 32
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - ${SEARXNG_CONFIG_DIR:?required}:/etc/searxng:rw   # host dir holding searxng/settings.yml
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    driver: bridge
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
